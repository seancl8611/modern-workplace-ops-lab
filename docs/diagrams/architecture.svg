<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 560" font-family="Segoe UI, Calibri, Arial, sans-serif">

  <!-- Background -->
  <rect width="1000" height="560" fill="#fff"/>

  <defs>
    <marker id="arr" markerWidth="7" markerHeight="5" refX="6" refY="2.5" orient="auto" fill="#555">
      <polygon points="0 0,7 2.5,0 5"/>
    </marker>
    <marker id="arrGrn" markerWidth="7" markerHeight="5" refX="6" refY="2.5" orient="auto" fill="#2E7D32">
      <polygon points="0 0,7 2.5,0 5"/>
    </marker>
    <marker id="arrOrg" markerWidth="7" markerHeight="5" refX="6" refY="2.5" orient="auto" fill="#BF360C">
      <polygon points="0 0,7 2.5,0 5"/>
    </marker>
    <marker id="arrRed" markerWidth="7" markerHeight="5" refX="6" refY="2.5" orient="auto" fill="#C62828">
      <polygon points="0 0,7 2.5,0 5"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="500" y="28" font-size="15" font-weight="600" fill="#222" text-anchor="middle">Modern Workplace &amp; Identity Ops Lab — Architecture</text>
  <text x="500" y="44" font-size="10" fill="#888" text-anchor="middle">contosoopslab.onmicrosoft.com  ·  M365 Business Premium Trial</text>

  <!-- =============================== -->
  <!-- USERS                            -->
  <!-- =============================== -->
  <rect x="30" y="90" width="130" height="70" rx="4" fill="#fff" stroke="#555" stroke-width="1.2"/>
  <text x="95" y="115" font-size="11" font-weight="600" fill="#222" text-anchor="middle">Users</text>
  <text x="95" y="131" font-size="9" fill="#666" text-anchor="middle">Riley Chen</text>
  <text x="95" y="143" font-size="9" fill="#666" text-anchor="middle">Taylor Brooks, etc.</text>

  <!-- Users → Entra -->
  <line x1="160" y1="125" x2="218" y2="125" stroke="#555" stroke-width="1.2" marker-end="url(#arr)"/>
  <text x="189" y="119" font-size="8" fill="#666" text-anchor="middle">Sign-in</text>

  <!-- =============================== -->
  <!-- ENTRA ID                         -->
  <!-- =============================== -->
  <rect x="220" y="72" width="220" height="110" rx="4" fill="#E3F2FD" stroke="#1565C0" stroke-width="1.2"/>
  <rect x="220" y="72" width="220" height="24" rx="4" fill="#1565C0"/>
  <rect x="220" y="88" width="220" height="8" fill="#1565C0"/>
  <text x="330" y="89" font-size="11" font-weight="600" fill="#fff" text-anchor="middle">Microsoft Entra ID</text>

  <text x="234" y="114" font-size="9.5" font-weight="600" fill="#333">Security Groups</text>
  <text x="244" y="128" font-size="9" fill="#444">SG-All Employees</text>
  <text x="244" y="140" font-size="9" fill="#444">SG-MFA-Required</text>
  <text x="244" y="152" font-size="9" fill="#444">SG-Finance · SG-Engineering</text>
  <text x="244" y="164" font-size="9" fill="#444">SG-Sales · SG-IT-Admins</text>
  <text x="244" y="176" font-size="9" fill="#999">SG-Dynamic-AllStaff</text>

  <!-- Entra → CA -->
  <line x1="440" y1="125" x2="508" y2="125" stroke="#555" stroke-width="1.2" stroke-dasharray="5,3" marker-end="url(#arr)"/>
  <text x="474" y="118" font-size="8" fill="#666" text-anchor="middle">CA eval</text>

  <!-- =============================== -->
  <!-- CONDITIONAL ACCESS               -->
  <!-- =============================== -->
  <rect x="510" y="72" width="240" height="110" rx="4" fill="#FFF3E0" stroke="#BF360C" stroke-width="1.2"/>
  <rect x="510" y="72" width="240" height="24" rx="4" fill="#BF360C"/>
  <rect x="510" y="88" width="240" height="8" fill="#BF360C"/>
  <text x="630" y="89" font-size="11" font-weight="600" fill="#fff" text-anchor="middle">Conditional Access</text>

  <text x="524" y="114" font-size="9" fill="#444">CA-001  Require MFA — All Users</text>
  <text x="524" y="129" font-size="9" fill="#444">CA-002  Block Legacy Auth</text>
  <text x="524" y="144" font-size="9" fill="#444">CA-003  Compliant Device — Finance</text>
  <text x="524" y="162" font-size="8.5" fill="#888" font-style="italic">Exclusion: Break-glass accounts (x2)</text>

  <!-- Grant / Block -->
  <rect x="780" y="88" width="70" height="28" rx="3" fill="#E8F5E9" stroke="#2E7D32" stroke-width="1"/>
  <text x="815" y="107" font-size="10" font-weight="600" fill="#2E7D32" text-anchor="middle">Grant</text>

  <rect x="780" y="126" width="70" height="28" rx="3" fill="#FFEBEE" stroke="#C62828" stroke-width="1"/>
  <text x="815" y="145" font-size="10" font-weight="600" fill="#C62828" text-anchor="middle">Block</text>

  <line x1="750" y1="115" x2="778" y2="102" stroke="#2E7D32" stroke-width="1" marker-end="url(#arrGrn)"/>
  <line x1="750" y1="135" x2="778" y2="140" stroke="#C62828" stroke-width="1" marker-end="url(#arrRed)"/>

  <!-- =============================== -->
  <!-- Entra → Intune (down arrow)      -->
  <!-- =============================== -->
  <line x1="330" y1="182" x2="330" y2="228" stroke="#555" stroke-width="1.2" marker-end="url(#arr)"/>
  <text x="338" y="210" font-size="8" fill="#666">Enrollment +</text>
  <text x="338" y="220" font-size="8" fill="#666">compliance state</text>

  <!-- =============================== -->
  <!-- INTUNE                           -->
  <!-- =============================== -->
  <rect x="120" y="230" width="430" height="170" rx="4" fill="#E8F5E9" stroke="#2E7D32" stroke-width="1.2"/>
  <rect x="120" y="230" width="430" height="24" rx="4" fill="#2E7D32"/>
  <rect x="120" y="246" width="430" height="8" fill="#2E7D32"/>
  <text x="335" y="247" font-size="11" font-weight="600" fill="#fff" text-anchor="middle">Microsoft Intune</text>

  <!-- Compliance Policies -->
  <text x="134" y="274" font-size="9.5" font-weight="600" fill="#333">Compliance Policies</text>
  <text x="144" y="289" font-size="9" fill="#444">Require firewall enabled</text>
  <text x="144" y="303" font-size="9" fill="#444">Require antivirus</text>
  <text x="144" y="317" font-size="9" fill="#444">Require OS version threshold</text>

  <!-- Config Profiles -->
  <text x="310" y="274" font-size="9.5" font-weight="600" fill="#333">Configuration Profiles</text>
  <text x="320" y="289" font-size="9" fill="#444">Firewall Hardening</text>
  <text x="320" y="303" font-size="9" fill="#444">Update Ring (Standard)</text>
  <text x="320" y="317" font-size="9" fill="#444">Win32 App: 7-Zip</text>
  <text x="320" y="331" font-size="9" fill="#999" font-style="italic">BitLocker (if TPM)</text>

  <!-- Assignment targets -->
  <text x="134" y="348" font-size="8.5" fill="#666">Targets: SG-All Employees, SG-Finance</text>
  <text x="134" y="362" font-size="8.5" fill="#666">Apps: Exchange Online, SharePoint, Office</text>

  <!-- Device boxes -->
  <rect x="134" y="370" width="190" height="28" rx="3" fill="#fff" stroke="#2E7D32" stroke-width="0.8"/>
  <text x="229" y="382" font-size="8.5" fill="#333" text-anchor="middle">CONTOSOOPSLAB-PC01 (Win 11)</text>
  <text x="229" y="393" font-size="8.5" fill="#333" text-anchor="middle">CONTOSOOPSLAB-PC02 (Win 11)</text>

  <!-- =============================== -->
  <!-- PROACTIVE REMEDIATION            -->
  <!-- =============================== -->
  <rect x="580" y="230" width="350" height="170" rx="4" fill="#FFF3E0" stroke="#BF360C" stroke-width="1.2"/>
  <rect x="580" y="230" width="350" height="24" rx="4" fill="#BF360C"/>
  <rect x="580" y="246" width="350" height="8" fill="#BF360C"/>
  <text x="755" y="247" font-size="11" font-weight="600" fill="#fff" text-anchor="middle">Proactive Remediation</text>

  <!-- Step 1 -->
  <rect x="598" y="266" width="140" height="52" rx="3" fill="#fff" stroke="#BF360C" stroke-width="0.8"/>
  <text x="668" y="282" font-size="9.5" font-weight="600" fill="#BF360C" text-anchor="middle">1. Detect</text>
  <text x="668" y="296" font-size="8.5" fill="#444" text-anchor="middle">Detect-FirewallDrift.ps1</text>
  <text x="668" y="308" font-size="8" fill="#999" text-anchor="middle">Scheduled (hourly/daily)</text>

  <!-- Step 2 -->
  <rect x="776" y="266" width="140" height="52" rx="3" fill="#fff" stroke="#BF360C" stroke-width="0.8"/>
  <text x="846" y="282" font-size="9.5" font-weight="600" fill="#BF360C" text-anchor="middle">2. Remediate</text>
  <text x="846" y="296" font-size="8.5" fill="#444" text-anchor="middle">Remediate-FirewallDrift.ps1</text>
  <text x="846" y="308" font-size="8" fill="#999" text-anchor="middle">Set-NetFirewallProfile</text>

  <!-- Arrow 1 → 2 -->
  <line x1="738" y1="292" x2="774" y2="292" stroke="#BF360C" stroke-width="1" marker-end="url(#arrOrg)"/>

  <!-- Step 3 -->
  <rect x="660" y="334" width="196" height="40" rx="3" fill="#fff" stroke="#2E7D32" stroke-width="0.8"/>
  <text x="758" y="350" font-size="9.5" font-weight="600" fill="#2E7D32" text-anchor="middle">3. Re-evaluate</text>
  <text x="758" y="364" font-size="8.5" fill="#444" text-anchor="middle">Next check-in → compliant → CA-003 pass</text>

  <!-- Arrow 2 → 3 -->
  <line x1="846" y1="318" x2="846" y2="332" stroke="#2E7D32" stroke-width="1" marker-end="url(#arrGrn)"/>

  <!-- Cycle arrow 3 → 1 (routes around outside of Detect box) -->
  <path d="M660,354 L588,354 L588,292 L596,292" fill="none" stroke="#888" stroke-width="0.9" stroke-dasharray="4,3" marker-end="url(#arr)"/>
  <text x="586" y="328" font-size="7.5" fill="#999" text-anchor="end">repeats</text>

  <!-- Intune → Remediation connection -->
  <line x1="550" y1="315" x2="578" y2="295" stroke="#888" stroke-width="0.9" stroke-dasharray="4,3" marker-end="url(#arr)"/>
  <text x="536" y="308" font-size="7" fill="#888" text-anchor="end">Policy push</text>

  <!-- =============================== -->
  <!-- POWERSHELL SCRIPTS               -->
  <!-- =============================== -->
  <rect x="580" y="408" width="350" height="30" rx="3" fill="#F3E5F5" stroke="#7B1FA2" stroke-width="0.8"/>
  <text x="590" y="427" font-size="8.5" fill="#7B1FA2" font-weight="600">Scripts:</text>
  <text x="632" y="427" font-size="7.5" fill="#555">New-UserOnboarding.ps1  ·  Get-ComplianceReport.ps1  ·  Get-LicenseAudit.ps1</text>

  <!-- =============================== -->
  <!-- LEGEND                           -->
  <!-- =============================== -->
  <line x1="30" y1="470" x2="970" y2="470" stroke="#ddd" stroke-width="0.6"/>

  <rect x="30" y="484" width="10" height="10" rx="2" fill="#1565C0"/>
  <text x="46" y="493" font-size="9" fill="#555">Entra ID</text>

  <rect x="110" y="484" width="10" height="10" rx="2" fill="#BF360C"/>
  <text x="126" y="493" font-size="9" fill="#555">Conditional Access / Remediation</text>

  <rect x="310" y="484" width="10" height="10" rx="2" fill="#2E7D32"/>
  <text x="326" y="493" font-size="9" fill="#555">Intune</text>

  <rect x="390" y="484" width="10" height="10" rx="2" fill="#7B1FA2"/>
  <text x="406" y="493" font-size="9" fill="#555">PowerShell Automation</text>

  <line x1="560" y1="489" x2="590" y2="489" stroke="#555" stroke-width="1.2"/>
  <text x="596" y="493" font-size="9" fill="#555">Identity / enrollment</text>

  <line x1="720" y1="489" x2="750" y2="489" stroke="#555" stroke-width="1" stroke-dasharray="5,3"/>
  <text x="756" y="493" font-size="9" fill="#555">Evaluation / compliance</text>

  <text x="30" y="516" font-size="8" fill="#aaa">Group-based licensing: SG-All Employees membership drives license assignment and Intune policy targeting.</text>

  <text x="500" y="545" font-size="8" fill="#ccc" text-anchor="middle">Sean Clarke — Modern Workplace &amp; Identity Ops Lab</text>

</svg>
